<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign the Petition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #161618;
            --container-bg: #1e1e20;
            --input-bg: #161618;
            --input-border: #333336;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --accent-green: #6bcf93;
            --accent-green-hover: #5ab87f;
            --error-red: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .form-container {
            background: var(--container-bg);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #2a2a2c;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .header {
            margin-bottom: 30px;
        }

        .header h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 600;
        }

        .header p {
            margin: 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Grid for side-by-side inputs */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 6px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        /* Checkbox styling */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background-color: #242426;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--input-border);
            margin-bottom: 25px;
        }

        .checkbox-group input[type="checkbox"] {
            margin-top: 3px;
            accent-color: var(--accent-green);
            width: 16px;
            height: 16px;
        }

        .checkbox-group label {
            margin: 0;
            color: #d1d5db;
            font-size: 13px;
            line-height: 1.5;
            cursor: pointer;
        }

        /* Canvas Styling */
        .canvas-container {
            margin-bottom: 25px;
        }
        
        canvas {
            border: 1px solid var(--input-border);
            border-radius: 6px;
            /* Light background so black ink shows up in Google Sheets */
            background-color: #f3f4f6; 
            cursor: crosshair;
            touch-action: none; 
            width: 100%;
        }

        .clear-link {
            display: block;
            text-align: right;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
            cursor: pointer;
            text-decoration: underline;
        }

        .clear-link:hover {
            color: var(--text-main);
        }

        button.btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-green);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button.btn-submit:hover {
            background-color: var(--accent-green-hover);
        }

        button.btn-submit:disabled {
            background-color: #4a805f;
            cursor: not-allowed;
            color: #1a1a1a;
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <h2>Sign the Petition</h2>
        <p>Your voice matters. Add your signature to support the registration.</p>
    </div>

    <form id="collectionForm">
        <div class="form-row">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" required placeholder="Enter your first name">
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" required placeholder="Enter your last name">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="rollno">Roll Number</label>
                <input type="text" id="rollno" required placeholder="e.g. 24/299">
            </div>
            <div class="form-group">
                <label for="year">Year</label>
                <select id="year" required>
                    <option value="" disabled selected>Select year</option>
                    <option value="1st Year">1st Year</option>
                    <option value="2nd Year">2nd Year</option>
                    <option value="3rd Year">3rd Year</option>
                    <option value="4th Year">4th Year</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="department">Department</label>
            <select id="department" required>
                <option value="" disabled selected>Select department</option>
                <option value="BA Programme">BA Programme</option>
                <option value="Commerce">Commerce</option>
                <option value="Economics">Economics</option>
                <option value="Elementary Education">Elementary Education</option>
                <option value="English">English</option>
                <option value="Hindi">Hindi</option>
                <option value="History">History</option>
                <option value="Journalism">Journalism</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Philosophy">Philosophy</option>
                <option value="Political Science">Political Science</option>
                <option value="Psychology">Psychology</option>
                <option value="Sanskrit">Sanskrit</option>
                <option value="Sociology">Sociology</option>
                <option value="Statistics">Statistics</option>
            </select>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="lsrStudent" required>
            <label for="lsrStudent">I am a currently enrolled student of LSR and I voluntarily support the registration of the NationBuilding Impact Chapter as an official college society.</label>
        </div>

        <div class="canvas-container">
            <label>Signature</label>
            <canvas id="signaturePad" width="440" height="150"></canvas>
            <span class="clear-link" id="clearBtn">Clear Signature</span>
        </div>

        <button type="submit" class="btn-submit">Sign the Petition</button>
    </form>
</div>

<script>
    const canvas = document.getElementById('signaturePad');
    const ctx = canvas.getContext('2d');
    const clearBtn = document.getElementById('clearBtn');
    const form = document.getElementById('collectionForm');

    // Drawing State
    let isDrawing = false;
    ctx.strokeStyle = '#000000'; // Black ink for visibility on the white sheet
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';

    function getCoordinates(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;   
        const scaleY = canvas.height / rect.height; 
        if (event.touches && event.touches.length > 0) {
            return { x: (event.touches[0].clientX - rect.left) * scaleX, y: (event.touches[0].clientY - rect.top) * scaleY };
        }
        return { x: (event.clientX - rect.left) * scaleX, y: (event.clientY - rect.top) * scaleY };
    }

    function startPosition(e) { isDrawing = true; draw(e); }
    function endPosition() { isDrawing = false; ctx.beginPath(); }
    
    function draw(e) {
        if (!isDrawing) return;
        if (e.type.includes('touch')) e.preventDefault();
        const { x, y } = getCoordinates(e);
        ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', endPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseout', endPosition);
    canvas.addEventListener('touchstart', startPosition, { passive: false });
    canvas.addEventListener('touchend', endPosition);
    canvas.addEventListener('touchmove', draw, { passive: false });

    clearBtn.addEventListener('click', () => { ctx.clearRect(0, 0, canvas.width, canvas.height); });

    // ==========================================
    // YOUR API KEYS GO HERE
    // ==========================================
    const imgbbAPIKey = 'b2541a1b7001d561fcbb20850f9aedeb'; 
    const googleScriptURL = 'https://script.google.com/macros/s/AKfycbwKRWSEbm24juz86uVIm1bVWiL3FT2cjAR4R8cvZXiOzjkhewLjudnbEB2dx6URKskpOg/exec'; 

    form.addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const submitBtn = document.querySelector('.btn-submit');
        
        // Combine First and Last name to keep your spreadsheet format the exact same
        const fullName = document.getElementById('firstName').value.trim() + ' ' + document.getElementById('lastName').value.trim();
        
        submitBtn.textContent = "Uploading Signature...";
        submitBtn.disabled = true;

        try {
            // 1. Convert signature to raw base64 data
            const rawBase64 = canvas.toDataURL('image/png').split(',')[1];
            
            // 2. Upload to ImgBB
            const imgFormData = new FormData();
            imgFormData.append('image', rawBase64);
            
            const imgResponse = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbAPIKey}`, {
                method: 'POST',
                body: imgFormData
            });
            const imgResult = await imgResponse.json();
            
            if (!imgResult.success) throw new Error("Image upload failed");
            
            // Clean short link
            const signatureLink = imgResult.data.url; 

            // 3. Send data to Google Sheets
            submitBtn.textContent = "Saving to Database...";
            const sheetData = {
                name: fullName,
                year: document.getElementById('year').value,
                department: document.getElementById('department').value,
                rollNo: document.getElementById('rollno').value,
                signature: signatureLink 
            };

            const sheetResponse = await fetch(googleScriptURL, {
                method: 'POST',
                body: JSON.stringify(sheetData),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            const sheetResult = await sheetResponse.json();

            if (sheetResult.status === "success") {
                alert(`Thank you, ${fullName}! Your signature has been recorded.`);
                form.reset();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else {
                alert("Database error. Please try again.");
            }
        } catch (error) {
            console.error('Error!', error);
            alert("Network error. Please check your connection and try again.");
        } finally {
            submitBtn.textContent = "Sign the Petition";
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
