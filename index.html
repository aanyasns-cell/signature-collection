<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Collection Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .form-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* Canvas Styling */
        .canvas-container {
            margin-bottom: 15px;
        }
        canvas {
            border: 2px dashed #007bff;
            border-radius: 4px;
            background-color: #fdfdfd;
            cursor: crosshair;
            /* Prevents scrolling on mobile while drawing */
            touch-action: none; 
            width: 100%;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            color: #fff;
        }
        .btn-submit {
            background-color: #28a745;
        }
        .btn-submit:hover {
            background-color: #218838;
        }
        .btn-clear {
            background-color: #dc3545;
        }
        .btn-clear:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Student Details & Signature</h2>
    <form id="collectionForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required placeholder="Enter your name">
        </div>
        
        <div class="form-group">
            <label for="year">Year</label>
            <select id="year" required>
                <option value="">Select Year</option>
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
            </select>
        </div>

        <div class="form-group">
            <label for="department">Department</label>
            <input type="text" id="department" required placeholder="e.g., Computer Science">
        </div>

        <div class="form-group">
            <label for="rollno">Roll No.</label>
            <input type="text" id="rollno" required placeholder="Enter your roll number">
        </div>

        <div class="canvas-container">
            <label>Signature</label>
            <canvas id="signaturePad" width="440" height="200"></canvas>
        </div>

        <div class="button-group">
            <button type="button" class="btn-clear" id="clearBtn">Clear Signature</button>
            <button type="submit" class="btn-submit">Submit Record</button>
        </div>
    </form>
</div>

<script>
    const canvas = document.getElementById('signaturePad');
    const ctx = canvas.getContext('2d');
    const clearBtn = document.getElementById('clearBtn');
    const form = document.getElementById('collectionForm');

    // Drawing State
    let isDrawing = false;

    // Stroke styling
    ctx.strokeStyle = '#000000'; // Black ink
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    // Utility function to get correct mouse/touch coordinates
    function getCoordinates(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;   
        const scaleY = canvas.height / rect.height; 

        if (event.touches && event.touches.length > 0) {
            return {
                x: (event.touches[0].clientX - rect.left) * scaleX,
                y: (event.touches[0].clientY - rect.top) * scaleY
            };
        }
        return {
            x: (event.clientX - rect.left) * scaleX,
            y: (event.clientY - rect.top) * scaleY
        };
    }

    // Start Drawing
    function startPosition(e) {
        isDrawing = true;
        draw(e);
    }

    // Stop Drawing
    function endPosition() {
        isDrawing = false;
        ctx.beginPath(); 
    }

    // Draw Function
    function draw(e) {
        if (!isDrawing) return;
        
        // Prevent default scrolling on touch devices while drawing
        if (e.type.includes('touch')) e.preventDefault();

        const { x, y } = getCoordinates(e);

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    // Event Listeners for Mouse
    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', endPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseout', endPosition);

    // Event Listeners for Touch (Mobile support)
    canvas.addEventListener('touchstart', startPosition, { passive: false });
    canvas.addEventListener('touchend', endPosition);
    canvas.addEventListener('touchmove', draw, { passive: false });

    // Clear Canvas
    clearBtn.addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    // --- YOUR SECURE GOOGLE SHEET LINK ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyYv_jwGoC6m44SJCEAsH_Z6fR0ihyivQwQsaaP7HfwO0btHUIds6IZ1kieGOLDbehn/exec'; 

    // Handle Form Submission
    form.addEventListener('submit', async (e) => {
        e.preventDefault(); 

        const submitBtn = document.querySelector('.btn-submit');
        submitBtn.textContent = "Submitting...";
        submitBtn.disabled = true;

        const formData = {
            name: document.getElementById('name').value,
            year: document.getElementById('year').value,
            department: document.getElementById('department').value,
            rollNo: document.getElementById('rollno').value,
            signature: canvas.toDataURL('image/png') 
        };

        try {
            const response = await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(formData),
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8', 
                }
            });

            const result = await response.json();

            if (result.status === "success") {
                alert(`Successfully recorded data for ${formData.name}!`);
                form.reset();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else {
                alert("Something went wrong on the server. Please try again.");
                console.error(result.message);
            }
        } catch (error) {
            console.error('Error!', error.message);
            alert("Network error. Please check your connection and try again.");
        } finally {
            submitBtn.textContent = "Submit Record";
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
