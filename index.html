<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Collection Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .form-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 4px; box-sizing: border-box;
        }
        .canvas-container { margin-bottom: 15px; }
        canvas {
            border: 2px dashed #007bff; border-radius: 4px;
            background-color: #fdfdfd; cursor: crosshair;
            touch-action: none; width: 100%;
        }
        .button-group { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 10px; border: none; border-radius: 4px;
            font-size: 16px; cursor: pointer; color: #fff;
        }
        .btn-submit { background-color: #28a745; }
        .btn-submit:hover { background-color: #218838; }
        .btn-clear { background-color: #dc3545; }
        .btn-clear:hover { background-color: #c82333; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Student Details & Signature</h2>
    <form id="collectionForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required placeholder="Enter your name">
        </div>
        
        <div class="form-group">
            <label for="year">Year</label>
            <select id="year" required>
                <option value="">Select Year</option>
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
            </select>
        </div>

        <div class="form-group">
            <label for="department">Department</label>
            <input type="text" id="department" required placeholder="e.g., Computer Science">
        </div>

        <div class="form-group">
            <label for="rollno">Roll No.</label>
            <input type="text" id="rollno" required placeholder="Enter your roll number">
        </div>

        <div class="canvas-container">
            <label>Signature</label>
            <canvas id="signaturePad" width="440" height="200"></canvas>
        </div>

        <div class="button-group">
            <button type="button" class="btn-clear" id="clearBtn">Clear Signature</button>
            <button type="submit" class="btn-submit">Submit Record</button>
        </div>
    </form>
</div>

<script>
    const canvas = document.getElementById('signaturePad');
    const ctx = canvas.getContext('2d');
    const clearBtn = document.getElementById('clearBtn');
    const form = document.getElementById('collectionForm');

    // Drawing State
    let isDrawing = false;
    ctx.strokeStyle = '#000000'; 
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    function getCoordinates(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;   
        const scaleY = canvas.height / rect.height; 
        if (event.touches && event.touches.length > 0) {
            return { x: (event.touches[0].clientX - rect.left) * scaleX, y: (event.touches[0].clientY - rect.top) * scaleY };
        }
        return { x: (event.clientX - rect.left) * scaleX, y: (event.clientY - rect.top) * scaleY };
    }

    function startPosition(e) { isDrawing = true; draw(e); }
    function endPosition() { isDrawing = false; ctx.beginPath(); }
    
    function draw(e) {
        if (!isDrawing) return;
        if (e.type.includes('touch')) e.preventDefault();
        const { x, y } = getCoordinates(e);
        ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', endPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseout', endPosition);
    canvas.addEventListener('touchstart', startPosition, { passive: false });
    canvas.addEventListener('touchend', endPosition);
    canvas.addEventListener('touchmove', draw, { passive: false });

    clearBtn.addEventListener('click', () => { ctx.clearRect(0, 0, canvas.width, canvas.height); });

    // ==========================================
    // YOUR KEYS ARE PLUGGED IN HERE
    // ==========================================
    const imgbbAPIKey = 'b2541a1b7001d561fcbb20850f9aedeb'; 
    const googleScriptURL = 'https://script.google.com/macros/s/AKfycbwKRWSEbm24juz86uVIm1bVWiL3FT2cjAR4R8cvZXiOzjkhewLjudnbEB2dx6URKskpOg/exec'; 

    form.addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const submitBtn = document.querySelector('.btn-submit');
        submitBtn.textContent = "Uploading Signature...";
        submitBtn.disabled = true;

        try {
            // 1. Convert signature to raw base64 data
            const rawBase64 = canvas.toDataURL('image/png').split(',')[1];
            
            // 2. Upload to ImgBB
            const imgFormData = new FormData();
            imgFormData.append('image', rawBase64);
            
            const imgResponse = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbAPIKey}`, {
                method: 'POST',
                body: imgFormData
            });
            const imgResult = await imgResponse.json();
            
            if (!imgResult.success) throw new Error("Image upload failed");
            
            // This is the clean, short link from ImgBB!
            const signatureLink = imgResult.data.url; 

            // 3. Send data + clean link to Google Sheets
            submitBtn.textContent = "Saving to Database...";
            const sheetData = {
                name: document.getElementById('name').value,
                year: document.getElementById('year').value,
                department: document.getElementById('department').value,
                rollNo: document.getElementById('rollno').value,
                signature: signatureLink 
            };

            const sheetResponse = await fetch(googleScriptURL, {
                method: 'POST',
                body: JSON.stringify(sheetData),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            const sheetResult = await sheetResponse.json();

            if (sheetResult.status === "success") {
                alert(`Successfully recorded data for ${sheetData.name}!`);
                form.reset();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else {
                alert("Database error. Please try again.");
                console.error(sheetResult.message);
            }
        } catch (error) {
            console.error('Error!', error);
            alert("Network error. Please check your connection and try again.");
        } finally {
            submitBtn.textContent = "Submit Record";
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
